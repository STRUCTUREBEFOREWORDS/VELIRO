<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>STRUCTURE Redirect</title>
    <script>
      (function () {
        var location = window.location
        var basePath = location.pathname.slice(0, 1 + location.pathname.slice(1).indexOf('/'))
        var route = location.pathname.slice(basePath.length)
        var redirectUrl =
          location.origin +
          basePath +
          '/#' +
          route +
          location.search +
          location.hash

        window.location.replace(redirectUrl)
      })()
    </script>
  </head>
  <body></body>
</html>
